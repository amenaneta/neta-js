<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رحلة JavaScript التفاعلية</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #eef6ff, #f7ecff);
      color: #1f2937;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
      padding: 35px 20px;
      text-align: center;
      border-bottom-left-radius: 35px;
      border-bottom-right-radius: 35px;
    }

    header h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    header p {
      font-size: 18px;
      opacity: 0.95;
    }

    .container {
      max-width: 1150px;
      margin: 30px auto;
      padding: 0 18px;
    }

    .nav-bar {
      max-width: 1150px;
      margin: 20px auto;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 22px;
    }

    .lessons-list {
      background: white;
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
      height: fit-content;
      position: sticky;
      top: 20px;
    }

    .lessons-list h3 {
      margin-bottom: 15px;
      color: #111827;
    }

    .lesson-btn,
    .nav-page-btn {
      border: none;
      background: #f3f4f6;
      padding: 13px;
      margin-bottom: 10px;
      border-radius: 16px;
      text-align: right;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
      color: #1f2937;
    }

    .lesson-btn {
      width: 100%;
    }

    .nav-page-btn {
      width: auto;
      min-width: 130px;
      text-align: center;
    }

    .lesson-btn:hover,
    .lesson-btn.active,
    .nav-page-btn:hover {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
      transform: translateY(-2px);
    }

    .lesson-content {
      background: white;
      border-radius: 24px;
      padding: 26px;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
    }

    .tag {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      padding: 7px 13px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 12px;
    }

    .lesson-content h2 {
      font-size: 30px;
      color: #4f46e5;
      margin-bottom: 12px;
    }

    .lesson-content p {
      line-height: 1.9;
      font-size: 17px;
      margin-bottom: 16px;
    }

    .code-box {
      background: #111827;
      color: #d1fae5;
      border-radius: 18px;
      padding: 18px;
      direction: ltr;
      text-align: left;
      overflow-x: auto;
      margin: 15px 0;
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
    }

    .activity-box,
    .quiz-box,
    .challenge-box,
    .code-runner,
    .final-test-box {
      border-radius: 20px;
      padding: 18px;
      margin-top: 18px;
    }

    .activity-box {
      background: #eef2ff;
    }

    .terms-box {
      background: #ffffff;
      border: 1px solid #e5e7eb;
    }

    .quiz-box {
      background: #fff7ed;
    }

    .challenge-box {
      background: #ecfdf5;
    }

    .code-runner {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
    }

    .final-test-box {
      background: #fefce8;
      border: 1px solid #fde68a;
    }

    .box-title {
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 18px;
    }

    .answers button,
    .final-option {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      text-align: right;
      font-size: 15px;
      transition: 0.2s;
    }

    .answers button:hover,
    .final-option:hover {
      background: #f3f4f6;
    }

    .result {
      margin-top: 10px;
      font-weight: bold;
    }

    .complete-btn,
    .run-btn,
    .final-btn {
      margin-top: 12px;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    .complete-btn {
      margin-top: 22px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
    }

    .run-btn,
    .final-btn {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
    }

    .complete-btn:hover,
    .run-btn:hover,
    .final-btn:hover {
      transform: translateY(-2px);
    }

    .code-runner textarea {
      width: 100%;
      min-height: 160px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      padding: 14px;
      direction: ltr;
      text-align: left;
      font-size: 15px;
      font-family: Consolas, monospace;
      resize: vertical;
      background: white;
    }

    .output-box {
      margin-top: 12px;
      background: #111827;
      color: #d1fae5;
      border-radius: 14px;
      padding: 14px;
      min-height: 50px;
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
    }

    .footer-note {
      text-align: center;
      margin: 30px 0 15px;
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 850px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .lessons-list {
        position: static;
      }

      header h1 {
        font-size: 27px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>رحلة JavaScript التفاعلية</h1>
    <p>تعلم البرمجة خطوة بخطوة من خلال الشرح، التجربة، والأسئلة السريعة</p>
  </header>

  <main class="container">
    <nav class="nav-bar">
      <button type="button" id="homeButton" class="nav-page-btn">🏠 الرئيسية</button>
      <button type="button" id="finalButton" class="nav-page-btn">📝 الاختبار النهائي</button>
    </nav>

    <section class="layout">
      <aside class="lessons-list">
        <h3>الوحدات التعليمية</h3>
        <div id="lessonButtons"></div>
      </aside>

      <section class="lesson-content" id="lessonContent"></section>
    </section>

    <!-- أزرار التنقل تحت المحتوى بشكل واضح -->
    <div class="nav-bar" style="margin-top:20px">
      <button type="button" id="prevButton" class="nav-page-btn">⬅️ السابق</button>
      <button type="button" id="nextButton" class="nav-page-btn">➡️ التالي</button>
    </div>

    <p class="footer-note">تم إعداد الموقع كنسخة تعليمية أولية قابلة للتطوير والإضافة.</p>
  </main>

  <script>
    "use strict";

    const lessons = [
      {
        title: "مقدمة JavaScript",
        tag: "الوحدة 1",
        explanation: "JavaScript هي لغة برمجة تُستخدم لإضافة التفاعل داخل المواقع. من خلالها نستطيع عرض رسالة، استقبال معلومات من المستخدم، تغيير محتوى الصفحة، فحص إجابة، أو بناء لعبة بسيطة.",
        terms: "JavaScript: لغة برمجة تضيف تفاعل للموقع. alert: أمر يعرض رسالة للمستخدم. console.log: أمر يعرض رسالة داخل أدوات المطور.",
        code: "alert('أهلاً بكم في عالم JavaScript');\nconsole.log('هذه رسالة تظهر للمطور');",
        activity: "اذكروا أمثلة لمواقع فيها تفاعل مثل: زر تسجيل الدخول، لعبة، اختبار إلكتروني، أو سلة مشتريات.",
        questions: [
          { q: "ما وظيفة JavaScript في الموقع؟", a: ["تصميم الألوان فقط", "إضافة التفاعل", "كتابة النصوص فقط"], c: 1 },
          { q: "أي أمر يعرض رسالة للمستخدم؟", a: ["console.log", "alert", "let"], c: 1 },
          { q: "أين تظهر رسالة console.log؟", a: ["داخل الصفحة", "داخل أدوات المطور", "في عنوان الموقع"], c: 1 }
        ],
        challenge: "اكتب كود يعرض رسالة ترحيب باسمك باستخدام alert."
      },
      {
        title: "المتغيرات والثوابت",
        tag: "الوحدة 2",
        explanation: "المتغيرات والثوابت هي طريقة لحفظ المعلومات داخل البرنامج. المتغير يحفظ قيمة يمكن تغييرها مثل اسم الطالب أو عدد النقاط، والثابت يحفظ قيمة لا نريد تغييرها مثل اسم المشروع.",
        terms: "let: لتعريف متغير قابل للتغيير. const: لتعريف ثابت لا يتغير. variable: متغير. constant: ثابت.",
        code: "let studentName = 'Amina';\nlet points = 10;\nconst PROJECT_NAME = 'Neta';\nconsole.log(studentName + ' لديها ' + points + ' نقاط');",
        activity: "صنفوا المعلومات التالية إلى متغير أو ثابت: اسم الطالب، عدد النقاط، اسم الفرع، اسم المشروع.",
        questions: [
          { q: "أي كلمة نستخدم لتعريف متغير؟", a: ["let", "const", "alert"], c: 0 },
          { q: "أي كلمة نستخدم لتعريف ثابت؟", a: ["prompt", "const", "console"], c: 1 },
          { q: "أي مثال مناسب كمتغير؟", a: ["اسم المشروع", "عدد نقاط الطالب", "عدد أيام الأسبوع"], c: 1 }
        ],
        challenge: "عرّف متغيرًا باسم الطالب وثابتًا باسم الفرع، ثم اطبع جملة ترحيب."
      },
      {
        title: "أنواع القيم: Number و String",
        tag: "الوحدة 3",
        explanation: "في JavaScript توجد أنواع مختلفة من القيم. النوع number يُستخدم للأرقام، والنوع string يُستخدم للنصوص والكلمات والجمل. علامة + تجمع الأرقام، لكنها تربط النصوص معًا.",
        terms: "number: قيمة رقمية. string: قيمة نصية. + مع الأرقام تعني جمع، ومع النصوص تعني ربط.",
        code: "let age = 15;\nlet studentName = 'Sara';\nlet sentence = studentName + ' عمرها ' + age + ' سنة';\nconsole.log(sentence);",
        activity: "اعرضوا قيماً مختلفة واسألوا الطلاب: هل هذه Number أم String؟ مثل: 17، '17'، 'Neta'، 90.",
        questions: [
          { q: "ما نوع القيمة 25؟", a: ["string", "number", "boolean"], c: 1 },
          { q: "ما نوع القيمة 'Hello'؟", a: ["number", "string", "array"], c: 1 },
          { q: "ماذا تفعل + مع النصوص؟", a: ["تطرح", "تربط النصوص", "توقف البرنامج"], c: 1 }
        ],
        challenge: "اكتب متغيرين: اسم الطالب وعمره، ثم اطبع جملة كاملة تجمع بينهما."
      },
      {
        title: "Boolean و Modulo",
        tag: "الوحدة 4",
        explanation: "Boolean هو نوع قيمة له احتمالان فقط: true أو false. أما العامل modulo ورمزه % فيعطينا باقي القسمة، ونستخدمه مثلًا لمعرفة إذا كان العدد زوجيًا أو فرديًا.",
        terms: "boolean: قيمة منطقية true أو false. modulo %: يعطينا باقي القسمة. ===: مقارنة بين قيمتين.",
        code: "let number = 8;\nlet isEven = number % 2 === 0;\nconsole.log(isEven);",
        activity: "اختاروا أرقامًا مختلفة، وافحصوا هل هي زوجية أم فردية باستخدام باقي القسمة.",
        questions: [
          { q: "ما القيم الممكنة في Boolean؟", a: ["yes و no", "true و false", "1 و 2 فقط"], c: 1 },
          { q: "ما نتيجة 10 % 2؟", a: ["0", "1", "2"], c: 0 },
          { q: "إذا كان number % 2 === 0 فهذا يعني أن العدد...", a: ["فردي", "زوجي", "نصي"], c: 1 }
        ],
        challenge: "اكتب كود يفحص إذا كان رقم معيّن زوجيًا أو فرديًا."
      },
      {
        title: "الجمل الشرطية if / else",
        tag: "الوحدة 5",
        explanation: "الجمل الشرطية تجعل البرنامج يتخذ قرارًا حسب الحالة. نستخدم if عندما نريد تنفيذ أمر إذا كان الشرط صحيحًا، ونستخدم else إذا كان الشرط غير صحيح.",
        terms: "if: إذا تحقق الشرط. else: إذا لم يتحقق الشرط. condition: شرط. >= أكبر أو يساوي.",
        code: "let grade = 75;\nif (grade >= 60) {\n  console.log('ناجح');\n} else {\n  console.log('حاول مرة أخرى');\n}",
        activity: "حوّلوا مواقف يومية إلى شروط: إذا كان الجو ماطرًا، إذا كان الطالب حاضرًا، إذا كانت كلمة السر صحيحة.",
        questions: [
          { q: "متى يتم تنفيذ كود if؟", a: ["عندما يكون الشرط صحيحًا", "عندما يكون الشرط خطأ", "دائمًا"], c: 0 },
          { q: "متى يتم تنفيذ else؟", a: ["عندما يكون الشرط غير صحيح", "قبل if", "مع كل أمر"], c: 0 },
          { q: "أي رمز يعني أكبر أو يساوي؟", a: [">=", "<=", "==="], c: 0 }
        ],
        challenge: "اكتب شرطًا: إذا كانت العلامة 60 أو أكثر اطبع ناجح، وإلا اطبع حاول مرة أخرى."
      },
      {
        title: "الشروط المتداخلة و Switch",
        tag: "الوحدة 6",
        explanation: "أحيانًا يكون القرار مركبًا ونحتاج إلى شرط داخل شرط، وهذا يسمى شروطًا متداخلة. أما switch فنستخدمه عندما يكون لدينا عدة حالات واضحة لقيمة واحدة.",
        terms: "nested if: شرط داخل شرط. switch: اختيار بين عدة حالات. case: حالة معينة. break: إنهاء الحالة.",
        code: "let day = 'Monday';\nswitch(day) {\n  case 'Monday':\n    console.log('يوجد لقاء');\n    break;\n  case 'Friday':\n    console.log('نشاط خاص');\n    break;\n  default:\n    console.log('لا يوجد لقاء');\n}",
        activity: "ابنوا قرارًا حسب اليوم: يوم تعليم، يوم عطلة، يوم نشاط، ثم حوّلوه إلى switch.",
        questions: [
          { q: "متى نستخدم الشروط المتداخلة؟", a: ["في الحالات البسيطة فقط", "عندما يكون القرار مركبًا", "بدل المتغيرات"], c: 1 },
          { q: "متى يكون switch مناسبًا؟", a: ["عند وجود عدة حالات لقيمة واحدة", "عند تعريف نص", "عند كتابة تعليق"], c: 0 },
          { q: "ما وظيفة break في switch؟", a: ["توقف الحالة الحالية", "تعرف متغيرًا", "تطبع رسالة"], c: 0 }
        ],
        challenge: "اكتب switch يفحص اليوم ويطبع نوع اللقاء المناسب."
      },
      {
        title: "حلقات while",
        tag: "الوحدة 7",
        explanation: "الحلقة هي طريقة لتكرار تنفيذ أوامر عدة مرات. نستخدم while عندما نريد تنفيذ أمر طالما أن الشرط صحيح، ويجب تحديث الشرط حتى لا تصبح الحلقة لا نهائية.",
        terms: "loop: حلقة تكرار. while: طالما الشرط صحيح. i++: زيادة العداد بواحد. infinite loop: حلقة لا نهائية.",
        code: "let i = 1;\nwhile (i <= 5) {\n  console.log('مرحبا');\n  i++;\n}",
        activity: "اعطوا تعليمات متكررة للوصول إلى هدف داخل الصف، ثم ناقشوا كيف تختصر الحلقة هذه التعليمات.",
        questions: [
          { q: "ما وظيفة الحلقة؟", a: ["تكرار أوامر", "تعريف لون", "حذف الصفحة"], c: 0 },
          { q: "ماذا يعني i++؟", a: ["زيادة i بواحد", "إنقاص i", "إيقاف الحلقة"], c: 0 },
          { q: "ماذا يحدث إذا لم نحدث الشرط؟", a: ["قد تصبح الحلقة لا نهائية", "ينحذف الكود", "يتغير الاسم"], c: 0 }
        ],
        challenge: "اكتب حلقة while تطبع الأرقام من 1 حتى 10."
      },
      {
        title: "حلقات for",
        tag: "الوحدة 8",
        explanation: "حلقة for تُستخدم غالبًا عندما نعرف عدد مرات التكرار مسبقًا. في سطر واحد نكتب بداية العداد، شرط الاستمرار، وطريقة التحديث.",
        terms: "for: حلقة تكرار بعدد معروف. i: عداد. i < 5: شرط الاستمرار. i++: زيادة العداد.",
        code: "for (let i = 0; i < 5; i++) {\n  console.log('Hello');\n}",
        activity: "قارنوا بين while و for: متى نستخدم كل واحدة؟ ثم اطبعوا أسماء الطلاب باستخدام for.",
        questions: [
          { q: "متى نستخدم for غالبًا؟", a: ["عندما نعرف عدد التكرارات", "عند كتابة نص فقط", "عند تعريف ثابت"], c: 0 },
          { q: "أي جزء يحدد شرط الاستمرار؟", a: ["let i = 0", "i < 5", "i++"], c: 1 },
          { q: "ما اسم المتغير الشائع كعداد؟", a: ["name", "i", "alert"], c: 1 }
        ],
        challenge: "اكتب حلقة for تطبع الأرقام الزوجية من 2 حتى 20."
      },
      {
        title: "المصفوفات Arrays",
        tag: "الوحدة 9",
        explanation: "المصفوفة هي طريقة لحفظ عدة قيم داخل اسم واحد. كل قيمة داخل المصفوفة لها مكان يسمى index، والعد يبدأ من صفر. نستخدم length لمعرفة عدد العناصر.",
        terms: "array: مصفوفة. index: موقع العنصر. length: عدد العناصر. []: أقواس المصفوفة.",
        code: "let students = ['Sara', 'Omar', 'Lina'];\nconsole.log(students[0]);\nconsole.log(students.length);",
        activity: "اذكروا أمثلة لقوائم في المواقع: صور، فيديوهات، منتجات، أسماء، أسئلة اختبار.",
        questions: [
          { q: "ما فائدة المصفوفة؟", a: ["حفظ قيمة واحدة فقط", "حفظ عدة قيم", "عرض رسالة فقط"], c: 1 },
          { q: "من أي رقم يبدأ index؟", a: ["0", "1", "10"], c: 0 },
          { q: "ما وظيفة length؟", a: ["تعطينا عدد العناصر", "تحذف العنصر", "تغير اللون"], c: 0 }
        ],
        challenge: "أنشئ مصفوفة فيها 4 أسماء، ثم اطبع الاسم الأول والأخير."
      },
      {
        title: "أساليب المصفوفات Methods",
        tag: "الوحدة 10",
        explanation: "الأساليب هي أوامر جاهزة نستعملها مع الكائنات أو المصفوفات. نكتب اسم المصفوفة ثم نقطة ثم اسم الأسلوب. من الأساليب الشائعة push و pop.",
        terms: "method: أسلوب جاهز. push: إضافة عنصر. pop: حذف آخر عنصر. dot notation: كتابة نقطة بين الاسم والأسلوب.",
        code: "let fruits = ['apple', 'banana'];\nfruits.push('orange');\nconsole.log(fruits);\nfruits.pop();\nconsole.log(fruits);",
        activity: "اعطوا كل مجموعة أسلوبًا واحدًا وتطلبون منها شرح ماذا يفعل مع مثال بسيط.",
        questions: [
          { q: "كيف نستدعي أسلوبًا على مصفوفة؟", a: ["اسم المصفوفة ثم نقطة", "فقط alert", "باستخدام HTML"], c: 0 },
          { q: "ما وظيفة push؟", a: ["إضافة عنصر", "حذف كل العناصر", "فحص شرط"], c: 0 },
          { q: "ما وظيفة pop؟", a: ["حذف آخر عنصر", "إضافة لون", "إنشاء دالة"], c: 0 }
        ],
        challenge: "أنشئ مصفوفة أطعمة، أضف عنصرًا جديدًا باستخدام push، ثم احذف آخر عنصر باستخدام pop."
      },
      {
        title: "الدوال Functions",
        tag: "الوحدة 11",
        explanation: "الدالة هي مجموعة أوامر نعطيها اسمًا، ونستطيع تشغيلها أكثر من مرة. نستخدم الدوال حتى لا نكرر نفس الكود، وحتى يكون البرنامج منظمًا وسهل القراءة.",
        terms: "function: دالة. parameter: قيمة تستقبلها الدالة. return: إرجاع نتيجة. call: استدعاء الدالة.",
        code: "function sayHello(name) {\n  console.log('أهلاً ' + name);\n}\n\nsayHello('Neta');",
        activity: "اشرحوا الدالة كأنها مقطع متكرر في أغنية: بدل كتابته كل مرة، نعطيه اسمًا ونستدعيه عند الحاجة.",
        questions: [
          { q: "لماذا نستخدم الدوال؟", a: ["لتنظيم وتكرار الكود بسهولة", "لحذف المتغيرات", "لإيقاف الموقع"], c: 0 },
          { q: "ما هو parameter؟", a: ["قيمة تستقبلها الدالة", "لون الصفحة", "نوع من الصور"], c: 0 },
          { q: "ما وظيفة return؟", a: ["إرجاع قيمة من الدالة", "طباعة عنوان", "تعريف مصفوفة"], c: 0 }
        ],
        challenge: "اكتب دالة تستقبل اسم الطالب وتطبع له رسالة تشجيع."
      }
    ];

    let currentLesson = 0;
    const completed = new Set();
    const lessonButtons = document.getElementById("lessonButtons");
    const lessonContent = document.getElementById("lessonContent");

    function clearElement(element) {
      while (element.firstChild) {
        element.removeChild(element.firstChild);
      }
    }

    function createElement(tagName, className, textContent) {
      const element = document.createElement(tagName);
      if (className) element.className = className;
      if (textContent !== undefined) element.textContent = textContent;
      return element;
    }

    function appendBox(parent, className, title, text) {
      const box = createElement("div", className);
      box.appendChild(createElement("div", "box-title", title));
      box.appendChild(createElement("p", "", text));
      parent.appendChild(box);
      return box;
    }

    function renderButtons() {
      clearElement(lessonButtons);
      lessons.forEach((lesson, index) => {
        const label = `${completed.has(index) ? "✓ " : ""}${lesson.tag}: ${lesson.title}`;
        const button = createElement("button", "lesson-btn", label);
        button.type = "button";
        if (index === currentLesson) button.classList.add("active");
        button.addEventListener("click", () => {
          currentLesson = index;
          render();
        });
        lessonButtons.appendChild(button);
      });
    }

    function renderQuestions(container, questions) {
      questions.forEach((question, questionIndex) => {
        const questionBox = createElement("div", "single-question");
        questionBox.appendChild(createElement("p", "", `السؤال ${questionIndex + 1}: ${question.q}`));

        const answersBox = createElement("div", "answers");
        question.a.forEach((answer, answerIndex) => {
          const button = createElement("button", "", answer);
          button.type = "button";
          button.addEventListener("click", () => checkAnswer(questionIndex, answerIndex));
          answersBox.appendChild(button);
        });

        questionBox.appendChild(answersBox);
        const result = createElement("div", "result");
        result.id = `result-${questionIndex}`;
        questionBox.appendChild(result);
        container.appendChild(questionBox);
      });
    }

    function renderLesson() {
      const lesson = lessons[currentLesson];
      clearElement(lessonContent);

      lessonContent.appendChild(createElement("span", "tag", lesson.tag));
      lessonContent.appendChild(createElement("h2", "", lesson.title));
      lessonContent.appendChild(createElement("p", "", lesson.explanation));
      appendBox(lessonContent, "activity-box terms-box", "شرح المصطلحات", lesson.terms);

      const codeBox = createElement("pre", "code-box", lesson.code);
      lessonContent.appendChild(codeBox);
      appendBox(lessonContent, "activity-box", "نشاط", lesson.activity);

      const quizBox = createElement("div", "quiz-box");
      quizBox.appendChild(createElement("div", "box-title", "أسئلة"));
      renderQuestions(quizBox, lesson.questions);
      lessonContent.appendChild(quizBox);

      appendBox(lessonContent, "challenge-box", "تحدي", lesson.challenge);

      const runner = createElement("div", "code-runner");
      runner.appendChild(createElement("div", "box-title", "مكان كتابة الكود"));
      runner.appendChild(createElement("p", "", "اكتب كود JavaScript هنا ثم اضغط تشغيل. جرّب تعديل المثال أو حل التحدي."));

      const textarea = document.createElement("textarea");
      textarea.id = "studentCode";
      textarea.value = lesson.code;
      runner.appendChild(textarea);

      const runButton = createElement("button", "run-btn", "تشغيل الكود");
      runButton.type = "button";
      runButton.addEventListener("click", runStudentCode);
      runner.appendChild(runButton);

      const output = createElement("div", "output-box", "النتيجة ستظهر هنا...");
      output.id = "codeOutput";
      runner.appendChild(output);
      lessonContent.appendChild(runner);

      const completeButton = createElement("button", "complete-btn", "أنهيت الدرس");
      completeButton.type = "button";
      completeButton.addEventListener("click", completeLesson);
      lessonContent.appendChild(completeButton);
    }

    function checkAnswer(questionIndex, answerIndex) {
      const result = document.getElementById(`result-${questionIndex}`);
      const question = lessons[currentLesson].questions[questionIndex];
      const isCorrect = answerIndex === question.c;
      result.style.color = isCorrect ? "#15803d" : "#b91c1c";
      result.textContent = isCorrect ? "إجابة صحيحة، أحسنت!" : "قريب، حاول مرة أخرى.";
    }

    function runStudentCode() {
      const textarea = document.getElementById("studentCode");
      const output = document.getElementById("codeOutput");
      const code = textarea.value;
      const messages = [];
      const originalLog = console.log;
      const originalAlert = window.alert;

      console.log = function(...args) {
        messages.push(args.map(String).join(" "));
      };

      window.alert = function(message) {
        messages.push("alert: " + String(message));
      };

      try {
        new Function(code)();
        output.style.color = "#d1fae5";
        output.textContent = messages.length ? messages.join("\n") : "تم تشغيل الكود بدون رسائل.";
      } catch (error) {
        output.style.color = "#fecaca";
        output.textContent = "خطأ في الكود: " + error.message;
      } finally {
        console.log = originalLog;
        window.alert = originalAlert;
      }
    }

    function showFinalTest() {
      clearElement(lessonContent);
      const finalQuestions = lessons.map((lesson) => lesson.questions[0]);

      lessonContent.appendChild(createElement("h2", "", "الاختبار النهائي"));
      lessonContent.appendChild(createElement("p", "", "أجب عن الأسئلة التالية بعد إنهاء الوحدات. في النهاية اضغط على زر عرض النتيجة."));

      const finalBox = createElement("div", "final-test-box");
      finalQuestions.forEach((question, questionIndex) => {
        const questionBox = createElement("div", "single-question");
        questionBox.appendChild(createElement("p", "", `السؤال ${questionIndex + 1}: ${question.q}`));

        question.a.forEach((answer, answerIndex) => {
          const label = createElement("label", "final-option");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = `final-${questionIndex}`;
          input.value = String(answerIndex);
          label.appendChild(input);
          label.appendChild(document.createTextNode(" " + answer));
          questionBox.appendChild(label);
        });

        finalBox.appendChild(questionBox);
      });

      const finalButton = createElement("button", "final-btn", "عرض النتيجة");
      finalButton.type = "button";
      finalButton.addEventListener("click", checkFinalTest);
      finalBox.appendChild(finalButton);

      const finalResult = createElement("div", "result");
      finalResult.id = "finalResult";
      finalResult.style.fontSize = "20px";
      finalResult.style.marginTop = "15px";
      finalBox.appendChild(finalResult);
      lessonContent.appendChild(finalBox);
    }

    function checkFinalTest() {
      const finalQuestions = lessons.map((lesson) => lesson.questions[0]);
      let score = 0;

      finalQuestions.forEach((question, questionIndex) => {
        const selected = document.querySelector(`input[name="final-${questionIndex}"]:checked`);
        if (selected && Number(selected.value) === question.c) {
          score += 1;
        }
      });

      const percent = Math.round((score / finalQuestions.length) * 100);
      const finalResult = document.getElementById("finalResult");
      finalResult.style.color = percent >= 60 ? "#15803d" : "#b91c1c";
      finalResult.textContent = `نتيجتك: ${score} من ${finalQuestions.length} (${percent}%)`;
    }

    function completeLesson() {
      completed.add(currentLesson);
      renderButtons();
    }

    function goHome() {
      currentLesson = 0;
      render();
    }

    function nextLesson() {
      if (currentLesson < lessons.length - 1) {
        currentLesson += 1;
        render();
      }
    }

    function prevLesson() {
      if (currentLesson > 0) {
        currentLesson -= 1;
        render();
      }
    }

    function render() {
      renderButtons();
      renderLesson();
    }

    function validateLessonsData() {
      console.assert(Array.isArray(lessons), "lessons يجب أن تكون مصفوفة.");
      console.assert(lessons.length === 11, "يجب أن تحتوي البيانات على 11 وحدة.");
      lessons.forEach((lesson, index) => {
        console.assert(typeof lesson.title === "string" && lesson.title.length > 0, `عنوان الوحدة ${index + 1} غير صالح.`);
        console.assert(typeof lesson.tag === "string" && lesson.tag.length > 0, `وسم الوحدة ${index + 1} غير صالح.`);
        console.assert(typeof lesson.code === "string", `كود الوحدة ${index + 1} يجب أن يكون نصًا.`);
        console.assert(Array.isArray(lesson.questions) && lesson.questions.length >= 3, `الوحدة ${index + 1} تحتاج 3 أسئلة على الأقل.`);
        lesson.questions.forEach((question, qIndex) => {
          console.assert(typeof question.q === "string" && question.q.length > 0, `نص السؤال ${qIndex + 1} في الوحدة ${index + 1} غير صالح.`);
          console.assert(Array.isArray(question.a) && question.a.length >= 2, `السؤال ${qIndex + 1} في الوحدة ${index + 1} يحتاج إجابات.`);
          console.assert(Number.isInteger(question.c) && question.c >= 0 && question.c < question.a.length, `الإجابة الصحيحة للسؤال ${qIndex + 1} في الوحدة ${index + 1} غير صالحة.`);
        });
      });
    }

    function runSmokeTests() {
      validateLessonsData();
      console.assert(typeof render === "function", "دالة render غير معرفة.");
      console.assert(typeof renderButtons === "function", "دالة renderButtons غير معرفة.");
      console.assert(typeof renderLesson === "function", "دالة renderLesson غير معرفة.");
      console.assert(typeof runStudentCode === "function", "محرر الكود غير جاهز.");
      console.assert(typeof showFinalTest === "function", "الاختبار النهائي غير جاهز.");
      console.assert(Boolean(document.getElementById("lessonButtons")), "قائمة الدروس غير موجودة.");
      console.assert(Boolean(document.getElementById("lessonContent")), "منطقة المحتوى غير موجودة.");
      console.log("تم تشغيل اختبارات الموقع الداخلية بنجاح.");
    }

    document.getElementById("homeButton").addEventListener("click", goHome);
    document.getElementById("prevButton").addEventListener("click", prevLesson);
    document.getElementById("nextButton").addEventListener("click", nextLesson);
    document.getElementById("finalButton").addEventListener("click", showFinalTest);

    runSmokeTests();
    render();
  </script>
</body>
</html>
