<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رحلة JavaScript التفاعلية</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #eef6ff, #f7ecff);
      color: #1f2937;
    }

    header {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
      text-align: center;
      padding: 32px 16px;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
    }

    header h1 { margin: 0 0 8px; font-size: 32px; }
    header p { margin: 0; font-size: 17px; }

    .container { max-width: 1150px; margin: 24px auto; padding: 0 16px; }

    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px;
      align-items: start;
    }

    .lessons-list,
    .lesson-content {
      background: white;
      border-radius: 22px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
      padding: 18px;
    }

    .lessons-list h3 { margin-top: 0; color: #4f46e5; }

    button {
      border: none;
      border-radius: 14px;
      padding: 11px 14px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.2s;
    }

    button:hover { transform: translateY(-1px); }

    .lesson-btn {
      display: block;
      width: 100%;
      margin: 8px 0;
      text-align: right;
      background: #f3f4f6;
      color: #1f2937;
    }

    .lesson-btn.active,
    .main-btn {
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      color: white;
    }

    .controls-after-lessons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .progress-box {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 14px;
    }

    .progress-text {
      font-weight: bold;
      color: #4f46e5;
      margin-bottom: 8px;
      text-align: center;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(135deg, #4f46e5, #9333ea);
      transition: width 0.3s ease;
    }

    .nav-bottom {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      border-radius: 999px;
      padding: 6px 12px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    h2 { color: #4f46e5; margin-top: 0; }
    p { line-height: 1.8; font-size: 16px; }

    .box { margin-top: 16px; padding: 16px; border-radius: 18px; }
    .terms-box { background: #f8fafc; border: 1px solid #e5e7eb; }
    .activity-box { background: #eef2ff; }
    .challenge-box { background: #ecfdf5; }
    .runner-box { background: #f8fafc; border: 1px solid #e5e7eb; }

    .example-box {
      background: #111827;
      color: #d1fae5;
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
      overflow-x: auto;
    }

    .runner-box textarea {
      width: 100%;
      min-height: 150px;
      direction: ltr;
      text-align: left;
      font-family: Consolas, monospace;
      font-size: 15px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      resize: vertical;
    }

    .output-box {
      margin-top: 12px;
      background: #111827;
      color: #d1fae5;
      padding: 12px;
      border-radius: 14px;
      min-height: 45px;
      direction: ltr;
      text-align: left;
      white-space: pre-wrap;
      font-family: Consolas, monospace;
    }

    .level { margin-top: 16px; padding: 14px; border-radius: 18px; }
    .easy { background: #ecfdf5; }
    .medium { background: #fff7ed; }
    .hard { background: #fee2e2; }

    .question-card {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(0, 0, 0, 0.06);
      border-radius: 16px;
      padding: 12px;
      margin: 10px 0;
    }

    .answers button {
      display: block;
      width: 100%;
      background: white;
      border: 1px solid #e5e7eb;
      margin: 7px 0;
      text-align: right;
    }

    .result { font-weight: bold; margin-top: 8px; }
    .final-box { background: #fefce8; border: 1px solid #fde68a; }

    .final-option {
      display: block;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px;
      margin: 8px 0;
      cursor: pointer;
    }

    @media (max-width: 850px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>رحلة JavaScript التفاعلية</h1>
    <p>شرح، مصطلحات، أمثلة، أسئلة بمستويات، وتدريب على كتابة الكود</p>
  </header>

  <main class="container">
    <div class="layout">
      <aside class="lessons-list">

        <div class="progress-box">
          <div id="progressText" class="progress-text">نسبة الإنجاز: 0%</div>
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>

        </div>
        <div id="lessonButtons"></div>
      </aside>

      <section>
        <div id="lessonContent" class="lesson-content"></div>
        <div class="nav-bottom">
          <button type="button" id="prevButton" class="main-btn">السابق</button>
          <button type="button" id="nextButton" class="main-btn">التالي</button>
        </div>
      </section>
    </div>
  </main>

    var currentLesson = 0;
    var completedLessons = [];
    var lessonButtons = document.getElementById("lessonButtons");
    var lessonContent = document.getElementById("lessonContent");
    var prevButton = document.getElementById("prevButton");
    var nextButton = document.getElementById("nextButton");
    var progressText = document.getElementById("progressText");
    var progressFill = document.getElementById("progressFill");

    function clearElement(element) {
      while (element.firstChild) element.removeChild(element.firstChild);
    }

    function createElement(tagName, className, textContent) {
      var element = document.createElement(tagName);
      if (className) element.className = className;
      if (textContent !== undefined) element.textContent = textContent;
      return element;
    }

    function appendBox(parent, className, title, text) {
      var box = createElement("div", "box " + className);
      box.appendChild(createElement("h3", "", title));
      box.appendChild(createElement("p", "", text));
      parent.appendChild(box);
      return box;
    }

    function renderButtons() {
      clearElement(lessonButtons);

      for (var i = 0; i < lessons.length; i += 1) {
        var lesson = lessons[i];
        var button = createElement("button", "lesson-btn", lesson.tag + ": " + lesson.title);
        button.type = "button";
        if (i === currentLesson) button.classList.add("active");
        button.setAttribute("data-index", String(i));
        button.addEventListener("click", function (event) {
          currentLesson = Number(event.currentTarget.getAttribute("data-index"));
          render();
        });
        lessonButtons.appendChild(button);
      }

      var controls = createElement("div", "controls-after-lessons");

      var homeBtn = createElement("button", "lesson-btn", "الرئيسية");
      homeBtn.type = "button";
      homeBtn.addEventListener("click", function () {
        currentLesson = 0;
        render();
      });

      var finalBtn = createElement("button", "lesson-btn main-btn", "الاختبار النهائي");
      finalBtn.type = "button";
      finalBtn.addEventListener("click", showFinalTest);

      controls.appendChild(homeBtn);
      controls.appendChild(finalBtn);
      lessonButtons.appendChild(controls);
    }

    function renderQuestions(parent, questions) {
      var levels = { easy: [], medium: [], hard: [] };
      var titles = { easy: "سهل", medium: "متوسط", hard: "صعب" };
      var order = ["easy", "medium", "hard"];

      for (var i = 0; i < questions.length; i += 1) levels[questions[i].level].push(questions[i]);

      for (var levelIndex = 0; levelIndex < order.length; levelIndex += 1) {
        var levelName = order[levelIndex];
        var list = levels[levelName];
        if (list.length === 0) continue;

        var section = createElement("div", "level " + levelName);
        section.appendChild(createElement("h3", "", titles[levelName]));

        for (var qIndex = 0; qIndex < list.length; qIndex += 1) {
          var question = list[qIndex];
          var card = createElement("div", "question-card");
          card.appendChild(createElement("p", "", question.q));

          var answers = createElement("div", "answers");
          for (var aIndex = 0; aIndex < question.a.length; aIndex += 1) {
            var answerButton = createElement("button", "", question.a[aIndex]);
            answerButton.type = "button";
            answerButton.setAttribute("data-correct", String(question.c));
            answerButton.setAttribute("data-answer", String(aIndex));
            answerButton.addEventListener("click", function (event) {
              var selected = Number(event.currentTarget.getAttribute("data-answer"));
              var correct = Number(event.currentTarget.getAttribute("data-correct"));
              var result = event.currentTarget.parentElement.nextSibling;
              var isCorrect = selected === correct;
              result.style.color = isCorrect ? "#15803d" : "#b91c1c";
              result.textContent = isCorrect ? "إجابة صحيحة، أحسنت!" : "قريب، حاول مرة أخرى.";
            });
            answers.appendChild(answerButton);
          }
          card.appendChild(answers);
          card.appendChild(createElement("div", "result", ""));
          section.appendChild(card);
        }
        parent.appendChild(section);
      }
    }

    function renderCodeRunner(parent) {
      var runner = createElement("div", "box runner-box");
      runner.appendChild(createElement("h3", "", "مكان كتابة الكود"));
      runner.appendChild(createElement("p", "", "اكتب كود JavaScript هنا ثم اضغط تشغيل. المثال الموجود بسيط وليس حل التحدي."));

      var textarea = document.createElement("textarea");
      textarea.id = "studentCode";
      textarea.value = starterCode;
      runner.appendChild(textarea);

      var runButton = createElement("button", "main-btn", "تشغيل الكود");
      runButton.type = "button";
      runButton.addEventListener("click", runStudentCode);
      runner.appendChild(runButton);

      var output = createElement("div", "output-box", "النتيجة ستظهر هنا...");
      output.id = "codeOutput";
      runner.appendChild(output);
      parent.appendChild(runner);
    }

    function renderLesson() {
      markLessonCompleted(currentLesson);
      var lesson = lessons[currentLesson];
      clearElement(lessonContent);

      lessonContent.appendChild(createElement("span", "tag", lesson.tag));
      lessonContent.appendChild(createElement("h2", "", lesson.title));
      lessonContent.appendChild(createElement("p", "", lesson.explanation));
      appendBox(lessonContent, "terms-box", "شرح المصطلحات", lesson.terms);
      lessonContent.appendChild(createElement("pre", "box example-box", lesson.code));
      appendBox(lessonContent, "activity-box", "نشاط", lesson.activity);

      var questionsBox = createElement("div", "box");
      questionsBox.appendChild(createElement("h3", "", "أسئلة بمستويات"));
      renderQuestions(questionsBox, lesson.questions);
      lessonContent.appendChild(questionsBox);

      appendBox(lessonContent, "challenge-box", "تحدي", lesson.challenge);
      renderCodeRunner(lessonContent);
    }

    function runStudentCode() {
      var textarea = document.getElementById("studentCode");
      var output = document.getElementById("codeOutput");
      var code = textarea.value;
      var messages = [];
      var originalLog = console.log;
      var originalAlert = window.alert;

      console.log = function () {
        var args = Array.prototype.slice.call(arguments).map(String);
        messages.push(args.join(" "));
      };

      window.alert = function (message) {
        messages.push("alert: " + String(message));
      };

      try {
        new Function(code)();
        output.style.color = "#d1fae5";
        output.textContent = messages.length ? messages.join("\n") : "تم تشغيل الكود بدون رسائل.";
      } catch (error) {
        output.style.color = "#fecaca";
        output.textContent = "خطأ في الكود: " + error.message;
      } finally {
        console.log = originalLog;
        window.alert = originalAlert;
      }
    }

    function updateNav() {
      prevButton.style.display = currentLesson === 0 ? "none" : "inline-block";
      nextButton.style.display = currentLesson === lessons.length - 1 ? "none" : "inline-block";
    }

    function nextLesson() {
      if (currentLesson < lessons.length - 1) {
        currentLesson += 1;
        render();
      }
    }

    function prevLesson() {
      if (currentLesson > 0) {
        currentLesson -= 1;
        render();
      }
    }

    function showFinalTest() {
      clearElement(lessonContent);
      lessonContent.appendChild(createElement("h2", "", "الاختبار النهائي"));
      lessonContent.appendChild(createElement("p", "", "أجب عن سؤال واحد من كل وحدة، ثم اضغط عرض النتيجة."));

      var finalBox = createElement("div", "box final-box");
      for (var i = 0; i < lessons.length; i += 1) {
        var question = lessons[i].questions[0];
        var card = createElement("div", "question-card");
        card.appendChild(createElement("p", "", "السؤال " + (i + 1) + ": " + question.q));

        for (var a = 0; a < question.a.length; a += 1) {
          var label = createElement("label", "final-option");
          var input = document.createElement("input");
          input.type = "radio";
          input.name = "final-" + i;
          input.value = String(a);
          label.appendChild(input);
          label.appendChild(document.createTextNode(" " + question.a[a]));
          card.appendChild(label);
        }
        finalBox.appendChild(card);
      }

      var button = createElement("button", "main-btn", "عرض النتيجة");
      button.type = "button";
      button.addEventListener("click", checkFinalTest);
      finalBox.appendChild(button);

      var result = createElement("div", "result", "");
      result.id = "finalResult";
      finalBox.appendChild(result);
      lessonContent.appendChild(finalBox);

      prevButton.style.display = "none";
      nextButton.style.display = "none";
    }

    function checkFinalTest() {
      var score = 0;
      for (var i = 0; i < lessons.length; i += 1) {
        var selected = document.querySelector("input[name='final-" + i + "']:checked");
        if (selected && Number(selected.value) === lessons[i].questions[0].c) score += 1;
      }
      var percent = Math.round((score / lessons.length) * 100);
      var result = document.getElementById("finalResult");
      result.style.color = percent >= 60 ? "#15803d" : "#b91c1c";
      result.textContent = "نتيجتك: " + score + " من " + lessons.length + " (" + percent + "%)";
    }

    function markLessonCompleted(index) {
      if (completedLessons.indexOf(index) === -1) {
        completedLessons.push(index);
      }
    }

    function updateProgress() {
      var percent = Math.round((completedLessons.length / lessons.length) * 100);
      progressText.textContent = "نسبة الإنجاز: " + percent + "%";
      progressFill.style.width = percent + "%";
    }

    function render() {
      renderButtons();
      renderLesson();
      updateNav();
      updateProgress();
    }

    function validateLessonsData() {
      console.assert(Array.isArray(lessons), "lessons must be an array");
      console.assert(lessons.length >= 1, "there must be at least one lesson");
      console.assert(typeof starterCode === "string" && starterCode.indexOf("\\n") === -1, "starterCode should contain an actual newline, not escaped slash-n text");

      for (var i = 0; i < lessons.length; i += 1) {
        var lesson = lessons[i];
        console.assert(typeof lesson.title === "string" && lesson.title.length > 0, "lesson title is invalid");
        console.assert(typeof lesson.tag === "string" && lesson.tag.length > 0, "lesson tag is invalid");
        console.assert(typeof lesson.code === "string", "lesson code must be a string");
        console.assert(Array.isArray(lesson.questions), "lesson questions must be an array");
        console.assert(lesson.questions.length >= 7, "lesson must include at least seven questions");

        var levelCount = { easy: 0, medium: 0, hard: 0 };
        for (var q = 0; q < lesson.questions.length; q += 1) {
          var question = lesson.questions[q];
          console.assert(typeof question.q === "string" && question.q.length > 0, "question text is invalid");
          console.assert(Array.isArray(question.a) && question.a.length >= 2, "question answers are invalid");
          console.assert(Number.isInteger(question.c) && question.c >= 0 && question.c < question.a.length, "correct answer index is invalid");
          console.assert(question.level === "easy" || question.level === "medium" || question.level === "hard", "question level is invalid");
          levelCount[question.level] += 1;
        }
        console.assert(levelCount.easy > 0, "easy questions are missing");
        console.assert(levelCount.medium > 0, "medium questions are missing");
        console.assert(levelCount.hard > 0, "hard questions are missing");
      }
    }

    function runSmokeTests() {
      validateLessonsData();
      console.assert(typeof render === "function", "render is missing");
      console.assert(typeof renderButtons === "function", "renderButtons is missing");
      console.assert(typeof renderLesson === "function", "renderLesson is missing");
      console.assert(typeof renderQuestions === "function", "renderQuestions is missing");
      console.assert(typeof renderCodeRunner === "function", "renderCodeRunner is missing");
      console.assert(typeof runStudentCode === "function", "runStudentCode is missing");
      console.assert(Boolean(lessonButtons), "lessonButtons element is missing");
      console.assert(Boolean(lessonContent), "lessonContent element is missing");
      console.assert(Boolean(progressText), "progressText element is missing");
      console.assert(Boolean(progressFill), "progressFill element is missing");
      console.assert(typeof updateProgress === "function", "updateProgress is missing");
      console.log("tests ok");
    }

    nextButton.addEventListener("click", nextLesson);
    prevButton.addEventListener("click", prevLesson);

    runSmokeTests();
    render();
  </script>
</body>
</html>
