      if (className) element.className = className;
      if (textContent !== undefined) element.textContent = textContent;
      return element;
    }

      return box;

      for (var levelIndex = 0; levelIndex < order.length; levelIndex += 1) {
        var levelName = order[levelIndex];
        var list = levels[levelName];
        if (list.length === 0) continue;

        for (var qIndex = 0; qIndex < list.length; qIndex += 1) {

    function runStudentCode() {
      var textarea = document.getElementById("studentCode");

      var code = textarea.value;
      var messages = [];
      var originalLog = console.log;

        challenge: "اكتب خطة ملفات لموقع من 4 صفحات، ثم ابنِ الصفحة الرئيسية مع menu يربط الصفحات ببعضها.",
        questions: [
          { q: "ما اسم الصفحة الرئيسية غالبا؟", a: ["index.html", "style.css", "image.png"], c: 0, level: "easy" },
          { q: "أي ملف نستخدمه للتصميم المشترك؟", a: ["style.css", "about.html", "contact.html"], c: 0, level: "easy" },
          { q: "ما وظيفة link في head؟", a: ["ربط ملف CSS", "إضافة جدول", "إرسال نموذج"], c: 0, level: "medium" },
          { q: "إذا كان الرابط href='about.html' ماذا يحدث؟", a: ["ينتقل لصفحة من أنا", "يغير لون النص", "يحذف الصفحة"], c: 0, level: "hard" }
        ]
      },
      {
        title: "المشروع النهائي: موقع كامل من عدة صفحات",
        tag: "الوحدة 11",
        explanation: "في هذه الوحدة يطبق الطلاب كل ما تعلموه لبناء موقع كامل من عدة صفحات، فيه menu، عناصر HTML متنوعة، وتصميم CSS مشترك.",
        terms: "مشروع نهائي: تطبيق عملي شامل. menu: قائمة تنقل. صفحات متعددة: index و about و projects و contact. header: رأس الصفحة. main: المحتوى الرئيسي. section: قسم مستقل. card: بطاقة محتوى. footer: أسفل الصفحة. style.css: ملف تصميم مشترك. التصميم الجيد يحتاج ألوان متناسقة، مسافات، ترتيب، وخط واضح.",
        code: finalProjectCode,
        extra: multiPageProjectGuide,
        challenge: "ابنِ موقعا من 4 صفحات: الرئيسية، من أنا، مشاريعي، تواصل. يجب أن تحتوي كل صفحة على نفس menu ونفس ملف CSS، وأن تستخدم عناصر HTML متنوعة مثل img و table و form و footer.",
        questions: [
          { q: "ما الهدف من المشروع النهائي؟", a: ["بناء موقع من عدة صفحات", "حفظ المصطلحات فقط", "حذف HTML"], c: 0, level: "easy" },
          { q: "أي جزء يمثل قائمة التنقل؟", a: ["nav", "li", "input"], c: 0, level: "easy" },
          { q: "ما فائدة style.css؟", a: ["تصميم مشترك لكل الصفحات", "صورة شخصية", "نموذج تسجيل"], c: 0, level: "medium" },
          { q: "أفضل طريقة لتطوير المشروع هي؟", a: ["نبني صفحة صفحة ونختبر الروابط", "نكتب كل شيء عشوائيا", "نحذف الوسوم"], c: 0, level: "hard" }
        ]
      }
    ];

    let currentLesson = 0;
    const state = loadState();

    const lessonButtons = document.getElementById("lessonButtons");
    const content = document.getElementById("content");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const homeBtn = document.getElementById("homeBtn");
    const finalBtn = document.getElementById("finalBtn");
    const resetBtn = document.getElementById("resetBtn");
    const progressText = document.getElementById("progressText");
    const progressFill = document.getElementById("progressFill");
    const scoreText = document.getElementById("scoreText");

    function loadState() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return JSON.parse(saved);
      return { completed: [], score: 0, answered: {}, code: {} };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function clearElement(element) {
      while (element.firstChild) element.removeChild(element.firstChild);
    }

    function createElement(tag, className, text) {
      const el = document.createElement(tag);
      if (className) el.className = className;
      if (text !== undefined) el.textContent = text;
      return el;
    }

    function addBox(parent, className, title, text) {
      const box = createElement("div", "box " + className);
      box.appendChild(createElement("h3", "", title));
      const p = createElement("p");
      p.innerHTML = wrapGlossary(text);
      box.appendChild(p);
      const note = createElement("div", "term-note", "اضغط على مصطلح أزرق لعرض شرحه هنا.");
      box.appendChild(note);
      parent.appendChild(box);
      enableGlossary(box);
      return box;
    }

    function addCodeBox(parent, title, code) {
      const box = createElement("div", "box pages-box");
      box.appendChild(createElement("h3", "", title));
      box.appendChild(createElement("pre", "file-card", code));
      parent.appendChild(box);
    }

    function wrapGlossary(text) {
      let result = text;
      Object.keys(glossary).forEach(function(term) {
        const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const regex = new RegExp("\\b" + safeTerm + "\\b", "g");
        result = result.replace(regex, "<span class='term' data-term='" + term + "'>" + term + "</span>");
      });
      return result;
    }

    function enableGlossary(scope) {
      scope.querySelectorAll(".term").forEach(function(el) {
        el.addEventListener("click", function() {
          const term = el.getAttribute("data-term");
          const note = scope.querySelector(".term-note");
          note.style.display = "block";
          note.textContent = term + ": " + glossary[term];
        });
      });
    }

    function markCompleted(index) {
      if (!state.completed.includes(index)) {
        state.completed.push(index);
        saveState();
      }
    }

    function updateProgress() {
      const percent = Math.round((state.completed.length / lessons.length) * 100);
      progressText.textContent = "نسبة الإنجاز: " + percent + "%";
      progressFill.style.width = percent + "%";
      scoreText.textContent = "التقييم: " + state.score + " نقطة";
    }

    function renderButtons() {
      clearElement(lessonButtons);
      lessons.forEach(function(lesson, index) {
        const prefix = state.completed.includes(index) ? "✓ " : "";
        const btn = createElement("button", "lesson-btn", prefix + lesson.tag + ": " + lesson.title);
        if (index === currentLesson) btn.classList.add("active");
        btn.addEventListener("click", function() {
          currentLesson = index;
          render();
        });
        lessonButtons.appendChild(btn);
      });
    }

    function renderLesson() {
      markCompleted(currentLesson);
      const lesson = lessons[currentLesson];
      clearElement(content);

      content.appendChild(createElement("span", "tag", lesson.tag));
      content.appendChild(createElement("h2", "", lesson.title));
      content.appendChild(createElement("p", "", lesson.explanation));
      addBox(content, "terms-box", "شرح المصطلحات", lesson.terms);
      content.appendChild(createElement("pre", "box example-box", lesson.code));
      if (lesson.extra) addCodeBox(content, "خطة ملفات المشروع", lesson.extra);
      addBox(content, "challenge-box", "تحدي", lesson.challenge);

      const qBox = createElement("div", "box");
      qBox.appendChild(createElement("h3", "", "أسئلة بمستويات"));
      renderQuestions(qBox, lesson.questions);
      content.appendChild(qBox);

      if (currentLesson === lessons.length - 1) {
        addBox(content, "project-box", "متطلبات المشروع النهائي", "الموقع النهائي يجب أن يحتوي على: 4 صفحات HTML، ملف style.css، menu مشترك، صورة، جدول، نموذج تواصل، footer، وألوان ومسافات واضحة.");
        renderEditor(finalProjectCode);
      } else {
        renderEditor(starterCode);
      }
    }

    function renderQuestions(parent, questions) {
      const groups = { easy: [], medium: [], hard: [] };
      const titles = { easy: "سهل", medium: "متوسط", hard: "صعب" };
      questions.forEach(q => groups[q.level].push(q));
      ["easy", "medium", "hard"].forEach(function(level) {
        const section = createElement("div", "level " + level);
        section.appendChild(createElement("h3", "", titles[level]));
        groups[level].forEach(function(q, qIndex) {
          const globalId = currentLesson + "-" + level + "-" + qIndex;
          const card = createElement("div", "question-card");
          card.appendChild(createElement("p", "", q.q));
          const answers = createElement("div", "answers");
          q.a.forEach(function(ans, aIndex) {
            const btn = createElement("button", "answer-btn", ans);
            btn.addEventListener("click", function() {
              const result = card.querySelector(".result");
              const correct = aIndex === q.c;
              result.style.color = correct ? "#15803d" : "#b91c1c";
              result.textContent = correct ? "إجابة صحيحة، أحسنت!" : "قريب، حاول مرة أخرى.";
              if (correct && !state.answered[globalId]) {
                state.answered[globalId] = true;
                state.score += level === "easy" ? 5 : level === "medium" ? 10 : 15;
                saveState();
                updateProgress();
              }
            });
            answers.appendChild(btn);
          });
          card.appendChild(answers);
          card.appendChild(createElement("div", "result", ""));
          section.appendChild(card);
        });
        parent.appendChild(section);
      });
    }

    function getCodeKey() { return "lesson-" + currentLesson; }

    function renderEditor(defaultCode) {
      const box = createElement("div", "box runner-box");
      box.appendChild(createElement("h3", "", "مكان كتابة الكود"));
      box.appendChild(createElement("p", "", "اكتب كود HTML و CSS هنا ثم اضغط تشغيل. يتم حفظ عملك تلقائيا داخل المتصفح."));
      const textarea = document.createElement("textarea");
      textarea.id = "studentCode";
      textarea.value = state.code[getCodeKey()] || defaultCode;
      textarea.addEventListener("input", function() {
        state.code[getCodeKey()] = textarea.value;
        saveState();
      });
      box.appendChild(textarea);
      const actions = createElement("div", "editor-actions");
      const runBtn = createElement("button", "main-btn", "تشغيل ومعاينة الكود");
      runBtn.addEventListener("click", runCode);
      const saveBtn = createElement("button", "main-btn", "حفظ العمل");
      saveBtn.addEventListener("click", function() {
        state.code[getCodeKey()] = textarea.value;
        saveState();
        alert("تم حفظ العمل داخل المتصفح");
      });
      actions.appendChild(runBtn);
      actions.appendChild(saveBtn);
      box.appendChild(actions);
      const frame = document.createElement("iframe");
      frame.id = "preview";
      box.appendChild(frame);
      content.appendChild(box);
    }

    function runCode() {
      const code = document.getElementById("studentCode").value;
      document.getElementById("preview").srcdoc = code;
      state.code[getCodeKey()] = code;
      saveState();
    }

    function showFinalTest() {
      clearElement(content);
      content.appendChild(createElement("h2", "", "الاختبار النهائي"));
      content.appendChild(createElement("p", "", "أجب عن سؤال واحد من كل وحدة، ثم اضغط عرض النتيجة."));
      const box = createElement("div", "box final-box");
      lessons.forEach(function(lesson, index) {
        const q = lesson.questions[0];
        const card = createElement("div", "question-card");
        card.appendChild(createElement("p", "", "السؤال " + (index + 1) + ": " + q.q));
        q.a.forEach(function(ans, aIndex) {
          const label = createElement("label", "final-option");
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "final-" + index;
          input.value = String(aIndex);
          label.appendChild(input);
          label.appendChild(document.createTextNode(" " + ans));
          card.appendChild(label);
        });
        box.appendChild(card);
      });
      const btn = createElement("button", "main-btn", "عرض النتيجة");
      btn.addEventListener("click", checkFinalTest);
      box.appendChild(btn);
      const result = createElement("div", "result", "");
      result.id = "finalResult";
      box.appendChild(result);
      content.appendChild(box);
      prevBtn.style.display = "none";
      nextBtn.style.display = "none";
    }

    function checkFinalTest() {
      let score = 0;
      lessons.forEach(function(lesson, index) {
        const selected = document.querySelector("input[name='final-" + index + "']:checked");
        if (selected && Number(selected.value) === lesson.questions[0].c) score += 1;
      });
      const percent = Math.round((score / lessons.length) * 100);
      const result = document.getElementById("finalResult");
      result.style.color = percent >= 60 ? "#15803d" : "#b91c1c";
      result.textContent = "نتيجتك: " + score + " من " + lessons.length + " (" + percent + "%)";
    }

    function updateNav() {
      prevBtn.style.display = currentLesson === 0 ? "none" : "inline-block";
      nextBtn.style.display = currentLesson === lessons.length - 1 ? "none" : "inline-block";
    }

    function render() {
      renderButtons();
      renderLesson();
      updateNav();
      updateProgress();
    }

    prevBtn.addEventListener("click", function() {
      if (currentLesson > 0) {
        currentLesson -= 1;
        render();
      }
    });

    nextBtn.addEventListener("click", function() {
      if (currentLesson < lessons.length - 1) {
        currentLesson += 1;
        render();
      }
    });

    homeBtn.addEventListener("click", function() {
      currentLesson = 0;
      render();
    });

    finalBtn.addEventListener("click", showFinalTest);

    resetBtn.addEventListener("click", function() {
      if (confirm("هل تريد إعادة التقدم وحذف الأعمال المحفوظة؟")) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    });

    console.assert(Array.isArray(lessons), "lessons must be an array");
    console.assert(lessons.length === 11, "there should be 11 lessons");
    console.assert(typeof render === "function", "render must exist");
    console.assert(typeof runCode === "function", "runCode must exist");
    console.assert(typeof saveState === "function", "saveState must exist");
    console.assert(typeof loadState === "function", "loadState must exist");
    console.log("tests ok");

    render();
  </script>
</body>
</html>
